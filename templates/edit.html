<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Edit Student</h2>

<form method="POST">
    <input type="text" name="name" value="{{ student.name }}" class="form-control mb-2" required>
    <input type="number" name="age" value="{{ student.age }}" class="form-control mb-2" required>
    <input type="text" name="course" value="{{ student.course }}" class="form-control mb-2" required>

    <button class="btn btn-warning">Update</button>
</form>

<a href="/" class="btn btn-secondary mt-2">Back</a>

</body>
</html>
