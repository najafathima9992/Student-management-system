<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Student Management System</h2>

<form method="GET" class="mb-3">
    <input type="text" name="search" placeholder="Search by name" class="form-control">
</form>

<a href="/add" class="btn btn-primary mb-3">Add Student</a>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Course</th>
        <th>Action</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.id }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.age }}</td>
        <td>{{ student.course }}</td>
        <td>
            <a href="/edit/{{ student.id }}" class="btn btn-warning btn-sm">Edit</a>
            <a href="/delete/{{ student.id }}" class="btn btn-danger btn-sm">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
